{% extends "base.html" %}
{% block title %}Analitik Karyawan{% endblock %}
{% block content %}

<h2>Form Prediksi</h2>
<p style="text-align: center; color: #64748b; margin-bottom: 2rem;">Masukkan data karyawan di bawah ini untuk melihat probabilitas mereka meninggalkan perusahaan.</p>

<form method="POST">
    <div class="form-grid">
        <div class="form-group">
            <label>Umur</label>
            <input type="number" name="Age" placeholder="Contoh: 30" required>
        </div>

        <div class="form-group">
            <label>Pendapatan Bulanan ($)</label>
            <input type="number" name="MonthlyIncome" placeholder="Contoh: 5000" required>
        </div>

        <div class="form-group">
            <label>Jarak dari Rumah (km)</label>
            <input type="number" name="DistanceFromHome" placeholder="Contoh: 10" required>
        </div>

        <div class="form-group">
            <label>Tahun Bekerja di Perusahaan</label>
            <input type="number" name="YearsAtCompany" placeholder="Contoh: 5" required>
        </div>

        <div class="form-group">
            <label>Tingkat Jabatan</label>
            <input type="number" name="JobLevel" placeholder="1-5" required>
        </div>

        <div class="form-group">
            <label>Jumlah Perusahaan Tempat Bekerja</label>
            <input type="number" name="NumCompaniesWorked" placeholder="Contoh: 2" required>
        </div>

        <div class="form-group">
            <label>Kepuasaan Pekerjaan</label>
            <select name="JobSatisfaction">
                <option value="1">1 (Rendah)</option>
                <option value="2">2 (Sedang)</option>
                <option value="3" selected>3 (Tinggi)</option>
                <option value="4">4 (Sangat Tinggi)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Kepuasaan Lingkungan</label>
            <select name="EnvironmentSatisfaction">
                <option value="1">1 (Rendah)</option>
                <option value="2">2 (Sedang)</option>
                <option value="3" selected>3 (Tinggi)</option>
                <option value="4">4 (Sangat Tinggi)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tingkat Keseimbangan Pekerjaan</label>
            <select name="WorkLifeBalance">
                <option value="1">1 (Buruk)</option>
                <option value="2">2 (Baik)</option>
                <option value="3" selected>3 (Lebih Baik)</option>
                <option value="4">4 (Terbaik)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lembur</label>
            <select name="OverTime">
                <option value="No">Tidak</option>
                <option value="Yes">Ya</option>
            </select>
        </div>
    </div>

    <button type="submit" class="btn-submit">Mulai Prediksi</button>
</form>

{% if result %}
<div class="result-box">
    <h3>Hasil Prediksi Model</h3>
    <p>{{ result }}</p>
</div>
{% endif %}

{% endblock %}
